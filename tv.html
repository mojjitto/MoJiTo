<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streaming Platform</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: black;
            color: white;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        h1 {
            color: cyan;
            text-align: center;
        }
        .video-player {
            width: 100%;
            max-width: 720px;
            height: auto;
            background: linear-gradient(135deg, #00ffff, #ff00ff);
            border: 1px solid white;
            border-radius: 10px;
            position: relative;
        }
        /* Media Queries for Responsive Design */
        @media (max-width: 600px) {
            .container {
                flex-direction: column;
                padding: 10px;
            }
        }
        @media (min-width: 601px) and (max-width: 1280px) {
            .container {
                flex-direction: row;
                padding: 20px;
            }
        }
        /* Neon Aesthetic */
        .neon {
            text-shadow: 0 0 10px cyan,
                         0 0 20px cyan,
                         0 0 30px magenta,
                         0 0 40px magenta;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="neon">Welcome to Our Streaming Platform</h1>
        <div class="video-player">
            <video id="videoElement" width="720" controls>
                <source src="movie.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
        <div class="metadata">
            <p id="streamMetadata">Stream: Example Stream</p>
            <p id="qualityIndicator">Quality: 1080p</p>
            <p id="progressTracking">Progress: <span id="progress">0%</span></p>
        </div>
        <div class="controls">
            <button onclick="playVideo()">Play</button>
            <button onclick="pauseVideo()">Pause</button>
        </div>
    </div>
    <script>
        // Video Controls
        const video = document.getElementById('videoElement');
        function playVideo() {
            video.play();
        }
        function pauseVideo() {
            video.pause();
        }
        // Search Functionality, Favorites Management can be added here
        // Example:
        // function searchVideo() {}
        // function addToFavorites() {}
        // Keyboard Navigation for TV can be implemented here
    </script>
</body>
</html>
